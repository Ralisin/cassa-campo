services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cassa_campo}
      POSTGRES_USER: ${POSTGRES_USER:-cassa_campo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cassa_campo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cassa_campo} -d ${POSTGRES_DB:-cassa_campo}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

